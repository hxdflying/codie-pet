<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodiePet cover</title>
  <desc id="desc">A banner for CodiePet, a Codex plugin that creates animated avatar states from one photo.</desc>
  <rect width="1280" height="640" rx="36" fill="#0F172A"/>
  <path d="M0 0H1280V640H0V0Z" fill="url(#grid)" opacity="0.28"/>
  <circle cx="1050" cy="118" r="148" fill="#10A37F" opacity="0.18"/>
  <circle cx="1136" cy="484" r="180" fill="#38BDF8" opacity="0.12"/>
  <circle cx="178" cy="520" r="168" fill="#F59E0B" opacity="0.1"/>

  <g filter="url(#shadow)">
    <rect x="94" y="92" width="1092" height="456" rx="32" fill="#111827" stroke="#263244"/>
  </g>

  <g transform="translate(148 143)">
    <rect x="0" y="0" width="132" height="132" rx="30" fill="#10A37F"/>
    <circle cx="66" cy="53" r="30" fill="#ECFDF5"/>
    <path d="M35 104C40 81 53 70 66 70C79 70 92 81 97 104H35Z" fill="#ECFDF5"/>
    <circle cx="55" cy="51" r="4" fill="#0F172A"/>
    <circle cx="77" cy="51" r="4" fill="#0F172A"/>
    <path d="M57 64C62 69 70 69 75 64" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="310" y="184" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="0">CodiePet</text>
  <text x="314" y="242" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="0">Turn one photo into a Q-style animated avatar pack for Codex.</text>

  <g transform="translate(314 292)">
    <rect x="0" y="0" width="154" height="46" rx="23" fill="#0B3B34" stroke="#10A37F"/>
    <text x="28" y="30" fill="#D1FAE5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">6 states</text>
    <rect x="174" y="0" width="158" height="46" rx="23" fill="#172554" stroke="#38BDF8"/>
    <text x="202" y="30" fill="#E0F2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">24 frames</text>
    <rect x="352" y="0" width="210" height="46" rx="23" fill="#451A03" stroke="#F59E0B"/>
    <text x="380" y="30" fill="#FEF3C7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">local workspace</text>
  </g>

  <g transform="translate(148 404)">
    <rect x="0" y="0" width="984" height="88" rx="22" fill="#0B1120" stroke="#263244"/>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">
      <text x="88" y="52" fill="#D1FAE5">idle</text>
      <text x="244" y="52" fill="#BAE6FD">peek</text>
      <text x="400" y="52" fill="#FDE68A">loading</text>
      <text x="556" y="52" fill="#DDD6FE">coding</text>
      <text x="712" y="52" fill="#FECACA">error</text>
      <text x="868" y="52" fill="#BBF7D0">done</text>
    </g>
    <g opacity="0.9">
      <circle cx="88" cy="28" r="6" fill="#10A37F"/>
      <circle cx="244" cy="28" r="6" fill="#38BDF8"/>
      <circle cx="400" cy="28" r="6" fill="#F59E0B"/>
      <circle cx="556" cy="28" r="6" fill="#A78BFA"/>
      <circle cx="712" cy="28" r="6" fill="#F87171"/>
      <circle cx="868" cy="28" r="6" fill="#22C55E"/>
    </g>
  </g>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#94A3B8" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="58" y="60" width="1164" height="528" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
</svg>
